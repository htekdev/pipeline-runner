name: Protect Compiled Output
description: >
  Blocks all direct modifications to the dist/ directory. Compiled output
  must be generated via 'npm run build', not edited manually.
on:
  file:
    lifecycle: pre
    paths:
      - 'dist/**'
    types: [edit, create, delete]
blocking: true
steps:
  - name: Block dist modification
    run: |
      Write-Host "❌ Cannot directly modify compiled output: ${{ event.file.path }}"
      Write-Host ""
      Write-Host "   The dist/ directory is generated by 'npm run build' (tsup)."
      Write-Host "   Edit source files in src/ instead, then rebuild."
      exit 1
