name: Enforce Test Coverage
description: >
  Blocks commits to source files if any test coverage area
  (unit, integration, E2E) falls below the configured thresholds
  (statements: 80%, branches: 75%, functions: 80%, lines: 80%).
on:
  commit:
    lifecycle: pre
    paths:
      - 'src/**'
    paths-ignore:
      - 'src/**/*.test.*'
      - 'src/**/*.spec.*'
blocking: true
steps:
  - name: Build project (required for integration/E2E)
    run: |
      Write-Host "đź”¨ Building project..."
      npm run build --silent
      if ($LASTEXITCODE -ne 0) {
        Write-Host "âťŚ Build failed â€” cannot verify coverage"
        exit 1
      }
      Write-Host "âś… Build succeeded"

  - name: Run unit test coverage
    run: |
      Write-Host "đź§Ş Running unit test coverage..."
      npm run test:coverage:unit --silent 2>&1
      if ($LASTEXITCODE -ne 0) {
        Write-Host "âťŚ Unit test coverage below thresholds (statementsâ‰Ą80%, branchesâ‰Ą75%, functionsâ‰Ą80%, linesâ‰Ą80%)"
        exit 1
      }
      Write-Host "âś… Unit coverage passed"

  - name: Run integration test coverage
    run: |
      Write-Host "đź§Ş Running integration test coverage..."
      npm run test:coverage:integration --silent 2>&1
      if ($LASTEXITCODE -ne 0) {
        Write-Host "âťŚ Integration test coverage below thresholds (statementsâ‰Ą80%, branchesâ‰Ą75%, functionsâ‰Ą80%, linesâ‰Ą80%)"
        exit 1
      }
      Write-Host "âś… Integration coverage passed"

  - name: Run E2E test coverage
    run: |
      Write-Host "đź§Ş Running E2E test coverage..."
      npm run test:coverage:e2e --silent 2>&1
      if ($LASTEXITCODE -ne 0) {
        Write-Host "âťŚ E2E test coverage below thresholds (statementsâ‰Ą80%, branchesâ‰Ą75%, functionsâ‰Ą80%, linesâ‰Ą80%)"
        exit 1
      }
      Write-Host "âś… E2E coverage passed"
    timeout: 300
