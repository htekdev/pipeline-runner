name: Enforce Kebab-Case File Naming
description: >
  All new TypeScript source and test files must use kebab-case naming
  (lowercase letters, numbers, and hyphens). No camelCase, PascalCase,
  or underscores.
on:
  file:
    lifecycle: pre
    paths:
      - 'src/**/*.ts'
      - 'tests/**/*.ts'
    types: [create]
blocking: true
steps:
  - name: Verify kebab-case filename
    run: |
      $FILEPATH = "${{ event.file.path }}"
      $FILENAME = Split-Path -Leaf $FILEPATH

      # Strip known extensions: .test.ts, .spec.ts, .e2e.ts, .d.ts, .ts
      $BASE = $FILENAME -replace '\.test\.ts$','' -replace '\.spec\.ts$','' -replace '\.e2e\.ts$','' -replace '\.d\.ts$','' -replace '\.ts$',''

      # Allow index files
      if ($BASE -eq 'index') {
        Write-Host "✅ Index file is allowed"
        exit 0
      }

      # Check for uppercase letters (not kebab-case)
      if ($BASE -cmatch '[A-Z]') {
        Write-Host "❌ File name must be kebab-case: $FILENAME"
        Write-Host "   Use lowercase-with-hyphens format (e.g., pipeline-runner.ts)"
        exit 1
      }

      # Check for underscores (should use hyphens)
      if ($BASE -match '_') {
        Write-Host "❌ File name must use hyphens, not underscores: $FILENAME"
        Write-Host "   Use kebab-case format (e.g., pipeline-runner.ts, not pipeline_runner.ts)"
        exit 1
      }

      # Check for spaces or special characters
      if ($BASE -match '[^a-z0-9-]') {
        Write-Host "❌ File name contains invalid characters: $FILENAME"
        Write-Host "   Only lowercase letters, numbers, and hyphens are allowed"
        exit 1
      }

      Write-Host "✅ File name '$FILENAME' follows kebab-case convention"
