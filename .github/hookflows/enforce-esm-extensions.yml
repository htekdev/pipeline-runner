name: Enforce ESM Import Extensions
description: >
  All relative imports in TypeScript source and test files must use .js
  extensions, as required by Node.js ESM resolution.
on:
  file:
    lifecycle: post
    paths:
      - 'src/**/*.ts'
      - 'tests/**/*.ts'
    paths-ignore:
      - 'src/**/*.d.ts'
    types: [edit]
blocking: true
steps:
  - name: Check relative imports have .js extension
    run: |
      $FILE = "${{ event.file.path }}"
      $BAD_IMPORTS = Select-String -Path $FILE -Pattern "from\s+['""]\.\.?/" | Where-Object { $_.Line -notmatch "\.js['""]" }
      if ($BAD_IMPORTS) {
        Write-Host "❌ Relative imports must use .js extension for ESM compatibility:"
        $BAD_IMPORTS | ForEach-Object { Write-Host "$($_.LineNumber): $($_.Line.Trim())" }
        Write-Host ""
        Write-Host "Fix: Add .js extension to each import path"
        Write-Host "  Example: from './foo' → from './foo.js'"
        exit 1
      }
      Write-Host "✅ All relative imports use .js extensions"
