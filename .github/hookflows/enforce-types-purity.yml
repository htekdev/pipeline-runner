name: Enforce Types Directory Purity
description: >
  The src/types/ directory must contain only type definitions — export type,
  export interface, and export enum. No runtime code (classes, functions,
  const assignments) is allowed.
on:
  file:
    lifecycle: post
    paths:
      - 'src/types/**/*.ts'
    types: [edit]
blocking: true
steps:
  - name: Check for runtime code in types directory
    run: |
      $FILE = "${{ event.file.path }}"

      # Check for runtime exports: class, function, const, let, var, default
      # These produce JavaScript output and don't belong in the types directory
      $BAD_EXPORTS = Select-String -Path $FILE -Pattern '^export\s+(class|function|const|let|var|default)\s+'

      if ($BAD_EXPORTS) {
        Write-Host "❌ src/types/ must contain only type definitions:"
        $BAD_EXPORTS | ForEach-Object { Write-Host "$($_.LineNumber): $($_.Line.Trim())" }
        Write-Host ""
        Write-Host "Use 'export type', 'export interface', or 'export enum' only."
        Write-Host "Move runtime code to the appropriate module directory."
        exit 1
      }

      Write-Host "✅ Types directory purity verified"
