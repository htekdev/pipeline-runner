name: Enforce Test File Placement
description: >
  Test files (.test.ts, .spec.ts) must be created under the tests/ directory,
  organized by test type: tests/unit/, tests/integration/, or tests/e2e/.
  Test files in src/ or the project root are not allowed.
on:
  file:
    lifecycle: pre
    paths:
      - '**/*.test.ts'
      - '**/*.spec.ts'
    types: [create]
blocking: true
steps:
  - name: Verify test file location
    run: |
      $FILEPATH = "${{ event.file.path }}"
      $NormalizedPath = $FILEPATH -replace '\\', '/'

      # Check that the file is under tests/ directory
      if ($NormalizedPath -notmatch '(^|/)tests/') {
        Write-Host "❌ Test files must be under the tests/ directory"
        Write-Host "   File: $FILEPATH"
        Write-Host ""
        Write-Host "   Place test files in the appropriate subdirectory:"
        Write-Host "     tests/unit/        — isolated unit tests"
        Write-Host "     tests/integration/ — CLI integration tests"
        Write-Host "     tests/e2e/         — full pipeline execution tests"
        exit 1
      }

      Write-Host "✅ Test file is in correct location"
