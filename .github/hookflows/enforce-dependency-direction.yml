name: Enforce Dependency Direction
description: >
  Enforces one-way dependency flow between source modules to preserve the
  layered architecture: types → parser/functions/variables/logging →
  compiler/security → runtime → cli. Upstream modules cannot import from
  downstream modules.
on:
  file:
    lifecycle: post
    paths:
      - 'src/**/*.ts'
    paths-ignore:
      - 'src/**/*.d.ts'
      - 'src/index.ts'
      - 'src/lib.ts'
    types: [edit]
blocking: true
steps:
  - name: Check module boundary compliance
    run: |
      $FILE = "${{ event.file.path }}"
      $NormalizedPath = $FILE -replace '\\', '/'

      # Determine which module this file belongs to
      if ($NormalizedPath -match '/src/([^/]+)/') {
        $MODULE = $Matches[1]
      } else {
        Write-Host "✅ File not in a module subdirectory, skipping"
        exit 0
      }

      # Define forbidden import patterns per module
      # Architecture: types → parser/functions/variables/logging → compiler/security → runtime → cli
      $FORBIDDEN = switch ($MODULE) {
        'types' { '/(cli|compiler|runtime|parser|functions|variables|logging|security|approvals|artifacts|environments|resources|tasks)/' }
        { $_ -in 'parser','functions','variables','logging' } { '/(cli|compiler|runtime|security)/' }
        { $_ -in 'compiler','security' } { '/(cli|runtime)/' }
        { $_ -in 'approvals','artifacts','environments','resources','tasks' } { '/(cli|runtime)/' }
        'runtime' { '/(cli)/' }
        'cli' {
          Write-Host "✅ CLI module can import from any module"
          exit 0
        }
        default {
          Write-Host "✅ Module '$MODULE' not in enforcement list, skipping"
          exit 0
        }
      }

      # Find relative imports that reference forbidden modules
      $BAD = Select-String -Path $FILE -Pattern "from\s+['""]" | Where-Object { $_.Line -match $FORBIDDEN }

      if ($BAD) {
        Write-Host "❌ Module '$MODULE' has forbidden imports:"
        $BAD | ForEach-Object { Write-Host "$($_.LineNumber): $($_.Line.Trim())" }
        Write-Host ""
        Write-Host "Dependency direction: types → parser/functions/variables/logging → compiler/security → runtime → cli"
        Write-Host "Upstream modules cannot import from downstream modules."
        exit 1
      }

      Write-Host "✅ Module boundary compliance verified for '$MODULE'"
