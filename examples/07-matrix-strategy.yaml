# Matrix strategy fans out a job across multiple configurations.
# Each combination runs as a separate job instance.
name: Matrix Strategy

stages:
  - stage: Test
    displayName: Cross-Platform Tests
    jobs:
      - job: TestMatrix
        displayName: Test
        strategy:
          matrix:
            node18_linux:
              nodeVersion: "18"
              platform: linux
            node20_linux:
              nodeVersion: "20"
              platform: linux
            node22_windows:
              nodeVersion: "22"
              platform: windows
          maxParallel: 2
        steps:
          - pwsh: |
              Write-Host "Testing on $env:PLATFORM with Node $env:NODEVERSION"
              Write-Host "Platform: $env:PLATFORM"
              Write-Host "Node version: $env:NODEVERSION"
            displayName: Run Tests

  - stage: Build
    displayName: Build Artifacts
    dependsOn: Test
    jobs:
      - job: BuildMatrix
        strategy:
          matrix:
            release:
              buildConfig: Release
              optimize: true
            debug:
              buildConfig: Debug
              optimize: false
        steps:
          - pwsh: |
              Write-Host "Building with config: $env:BUILDCONFIG"
              Write-Host "Optimization enabled: $env:OPTIMIZE"
            displayName: Build
